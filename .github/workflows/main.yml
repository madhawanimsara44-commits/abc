name: Node.js CI/CD Workflow

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm install

    - name: Start Asitha MD
      run: |
        timeout 5h 50m npm start || echo "Restarting"
      env:
        SESSION_ID: ${{ secrets.SESSION_ID }}
